name: Deploy Azure Function App

on:
  workflow_dispatch:

env:
  AZURE_APP_NAME: 'fa-manager-azurefunctions-dev-rg'
  AZURE_APP_NAME_ACCESSOR: 'fa-accessor-azurefunctions-dev-rg'
  AZURE_RG: 'azurefunctions-dev-rg'
  DOTNET_VERSION: '8.0'
  FUNCTION_PATH: 'devops/AzureFunctions/Solution1/Manager'
  FUNCTION_PATH_ACCESSOR: 'devops/AzureFunctions/Solution1/Accessor'


jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Development

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build Function Manager App
      run: dotnet publish -c Release -o ./publish
      working-directory: ${{ env.FUNCTION_PATH }}

    - name: Deploy to Azure Function App
      uses: Azure/functions-action@v1
      id: deploy
      with:
        app-name: ${{ env.AZURE_APP_NAME }}
        package: '${{ env.FUNCTION_PATH }}/publish'
        sku: 'flexconsumption'

    - name: Build Accessor Function App
      run: dotnet publish -c Release -o ./publish
      working-directory: ${{ env.FUNCTION_PATH_ACCESSOR }}

    - name: Deploy Accessor Function App
      uses: Azure/functions-action@v1
      id: deploy_accessor
      with:
        app-name: ${{ env.AZURE_APP_NAME_ACCESSOR }}
        package: '${{ env.FUNCTION_PATH_ACCESSOR }}/publish'
        sku: 'flexconsumption'
