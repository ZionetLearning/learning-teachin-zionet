name: Deploy Azure Function Apps

on:
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0'
  AZURE_RG: 'azurefunctions-dev-rg'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Development

    strategy:
      matrix:
        function:
          - name: 'fa-manager-azurefunctions-dev-rg'
            path: 'devops/AzureFunctions/Solution1/Manager'
          - name: 'fa-accessor-azurefunctions-dev-rg'
            path: 'devops/AzureFunctions/Solution1/Accessor'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build Function App
        run: dotnet publish -c Release -o ./publish
        working-directory: ${{ matrix.function.path }}

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ matrix.function.name }}
          package: '${{ matrix.function.path }}/publish'
          sku: 'flexconsumption'
