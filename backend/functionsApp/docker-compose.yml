version: '3.8'

services:
  # ---------------- Postgres ----------------
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sb-emulator

  # ------------ SQL Edge (for SB Emulator) ------------
  sqledge:
    container_name: sqledge
    image: mcr.microsoft.com/azure-sql-edge:latest
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "changeMe123!"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      sb-emulator:
        aliases:
          - sqlserver

  # --------- Azure Service Bus Emulator ---------
  servicebus-emulator:
    container_name: servicebus-emulator
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    depends_on:
      - sqledge
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "changeMe123!"
      SQL_SERVER: "sqlserver"
      SQL_PORT: "1433"
      # where your config.json lives on the host
      CONFIG_FILE_PATH: "/ServiceBus_Emulator/ConfigFiles/config.json"
    ports:
      - "5672:5672"    # AMQP
      - "9090:9090"    # (optional) HTTP management
    volumes:
      - ./config.json:/ServiceBus_Emulator/ConfigFiles/config.json:ro
    networks:
      sb-emulator:
        aliases:
          - sb-emulator

           # ------------ Azure Storage Emulator (Azurite) ------------
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    ports:
      - "10000:10000"   # Blob endpoint
      - "10001:10001"   # Queue endpoint
    volumes:
      - azurite_data:/data
    networks:
      - sb-emulator

  # ------------ Your Azure Function ------------
  function:
    build:
      context: ./AzureFunctionsProject    # adjust path if needed
      dockerfile: Dockerfile
    container_name: functions-app
    ports:
      - "7071:80"       # maps Function port → localhost:7071
    environment:
      # point the Functions host to Azurite for all storage bindings
      AzureWebJobsStorage: "UseDevelopmentStorage=true"
      FUNCTIONS_WORKER_RUNTIME: dotnet-isolated

      # if you have Service Bus triggers, mirror your emulator’s connection settings here:
      # (replace <…> with the values from your config.json)
      ServiceBusConnection__fullyQualifiedNamespace: sb-emulator
      ServiceBusConnection__sharedAccessKeyName: RootManageSharedAccessKey
      ServiceBusConnection__sharedAccessKey: <your‐root‐key>
    depends_on:
      - azurite
      - servicebus-emulator
    networks:
      - sb-emulator

volumes:
  pgdata:
  mssql-data:
  azurite_data:

networks:
  sb-emulator:
    driver: bridge
