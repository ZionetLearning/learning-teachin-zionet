apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: devops-tools
type: Opaque
stringData:
  # PostgreSQL connection details for dedicated Langfuse database
  DATABASE_USERNAME: "zionet_learning"
  DATABASE_PASSWORD: "your-actual-postgres-password"
  # Random secrets for Langfuse (these should be changed in production)
  NEXTAUTH_SECRET: "your-nextauth-secret-change-this-in-production-32chars"
  SALT: "your-salt-change-this-in-production-32chars-long"
  # Redis credentials
  REDIS_PASSWORD: "redis-password-change-in-production"
  # ClickHouse credentials
  CLICKHOUSE_PASSWORD: "clickhouse-password-change-in-production"
  # S3/MinIO credentials
  S3_USER: "minio"
  S3_PASSWORD: "minio-password-change-in-production"
