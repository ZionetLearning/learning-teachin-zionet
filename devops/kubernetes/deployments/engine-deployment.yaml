apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine
  namespace: dev
  labels:
    app: engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engine
  template:
    metadata:
      labels:
        app: engine
      annotaions:
        dapr.io/enabled: "true"
        dapr.io/app-id: "engine"
        dapr.io/app-port: "5002"  
    spec:
      containers:
        - name: engine
          image: engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5002
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
    