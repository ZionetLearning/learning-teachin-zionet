apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager
  namespace: dev
  labels:
    app: manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manager
  template:
    metadata:
      labels:
        app: manager
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "manager"
        dapr.io/app-port: "5001"
    spec:
      containers:
        - name: manager
          image: manager:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          env:
            - name: ASPNETCORE_URLS
              value: "http://*:5001"  
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
