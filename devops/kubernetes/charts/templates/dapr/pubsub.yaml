apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: {{ include "app.join" (list (include "app.prefix" .) "pubsub") }}
  namespace: {{ include "app.namespace" . }}
spec:
  type: pubsub.azure.servicebus
  version: v1
  metadata:
    - name: connectionString
      secretKeyRef:
        name: azure-service-bus-secret
        key: AzureServiceBusConnectionString
    - name: consumerID
      value: {{ include "app.join" (list (include "app.prefix" .) "engine") }}
    - name: disableEntityManagement
      value: "true"
scopes:
  - {{ include "app.appIdFor" (list $ "manager") }}
  - {{ include "app.appIdFor" (list $ "engine") }}
  - {{ include "app.appIdFor" (list $ "accessor") }}
